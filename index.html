<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FADIL SULTAN VIRAL | Official Dev</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --primary: #ff0033;
      --bg: #0a0a0a;
      --card: #151515;
      --text: #fff;
      --accent: #00ff88;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }
    
    /* DEVELOPER MODE BADGE */
    .dev-badge {
      position: fixed;
      top: 15px; left: 15px;
      background: linear-gradient(45deg, #ff0033, #ff8800);
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      z-index: 1000;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,0,51,0.7); }
      50% { box-shadow: 0 0 0 10px rgba(255,0,51,0); }
    }

    /* SETTING PANEL */
    .setting-btn {
      position: fixed;
      top: 15px; right: 15px;
      background: var(--card);
      border: 2px solid var(--primary);
      color: var(--primary);
      width: 45px; height: 45px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      z-index: 1000;
      transition: 0.3s;
    }
    .setting-btn:hover { transform: rotate(90deg); background: var(--primary); color: #000; }
    
    .setting-panel {
      position: fixed;
      top: 0; right: -350px;
      width: 320px; height: 100%;
      background: var(--card);
      border-left: 3px solid var(--primary);
      padding: 20px;
      transition: 0.4s;
      z-index: 999;
      overflow-y: auto;
    }
    .setting-panel.active { right: 0; }
    .setting-panel h3 {
      color: var(--primary);
      margin-bottom: 20px;
      border-bottom: 1px solid #333;
      padding-bottom: 10px;
    }
    .setting-group { margin-bottom: 20px; }
    .setting-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: var(--accent);
    }
    .setting-group input[type="text"], .setting-group input[type="color"], .setting-group select {
      width: 100%;
      padding: 8px;
      background: #222;
      border: 1px solid #333;
      color: #fff;
      border-radius: 5px;
    }
    .btn-dev {
      width: 100%;
      padding: 10px;
      background: var(--primary);
      border: none;
      color: #000;
      font-weight: 700;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    /* HERO SECTION */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: radial-gradient(circle at center, #1a0000 0%, #000 70%);
      padding: 20px;
      position: relative;
    }
    .hero h1 {
      font-size: 3.5rem;
      font-weight: 900;
      background: linear-gradient(45deg, var(--primary), #ff8800, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: glow 3s ease-in-out infinite;
      z-index: 2;
    }
    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 20px var(--primary)); }
      50% { filter: drop-shadow(0 0 40px var(--accent)); }
    }
    .hero p { margin: 20px 0; font-size: 1.2rem; opacity: 0.9; z-index: 2; }
    .dev-credit {
      margin-top: 10px;
      font-size: 14px;
      color: var(--accent);
      z-index: 2;
    }
    .dev-credit i { color: var(--primary); }

    /* ANIME DANCE */
    .anime-container {
      position: absolute;
      bottom: 0;
      right: 5%;
      width: 200px;
      height: 300px;
      z-index: 1;
      pointer-events: none;
    }
    .anime-girl {
      width: 100%;
      height: 100%;
      background: url('https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExdDZ0ZzZ6YzZ4aGg3cTN1cnQ5b2J2bXg5b3Z1dGJ1Z3E3d3R6dSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/3o7TKz2eMXx7dn95FS/giphy.gif') center/contain no-repeat;
      animation: dance 1s infinite alternate ease-in-out;
    }
    @keyframes dance {
      0% { transform: translateY(0) rotate(-2deg); }
      100% { transform: translateY(-15px) rotate(2deg); }
    }

    /* MUSIC CONTROL */
    .music-control {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: var(--card);
      border: 2px solid var(--primary);
      color: var(--primary);
      width: 50px; height: 50px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .music-control.playing {
      animation: musicSpin 2s linear infinite;
      background: var(--primary);
      color: #000;
    }
    @keyframes musicSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* VIRAL COUNTER */
    .viral-stats {
      display: flex;
      gap: 30px;
      margin: 30px 0;
      flex-wrap: wrap;
      justify-content: center;
      z-index: 2;
    }
    .stat {
      background: rgba(21,21,21,0.8);
      padding: 15px 25px;
      border-radius: 15px;
      border: 1px solid #333;
      backdrop-filter: blur(5px);
    }
    .stat-number {
      font-size: 2rem;
      font-weight: 900;
      color: var(--primary);
    }
    .stat-label { font-size: 0.9rem; opacity: 0.7; }

    /* VIRAL BUTTONS */
    .viral-btns {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
      z-index: 2;
    }
    .btn {
      padding: 12px 25px;
      border-radius: 50px;
      border: none;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-share { background: #25D366; color: #000; }
    .btn-tiktok { background: #000; color: #fff; border: 2px solid #fff; }
    .btn-copy { background: var(--accent); color: #000; }
    .btn:hover { transform: translateY(-3px) scale(1.05); }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: -100px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: #000;
      padding: 12px 25px;
      border-radius: 50px;
      font-weight: 700;
      transition: 0.4s;
      z-index: 1001;
    }
    .toast.show { bottom: 30px; }

    /* MOBILE */
    @media (max-width: 768px) {
      .hero h1 { font-size: 2.5rem; }
      .anime-container { width: 120px; height: 180px; right: 0; }
    }
  </style>
</head>
<body>
  <!-- DEVELOPER BADGE -->
  <div class="dev-badge">
    <i class="fas fa-code"></i> DEV: FADIL SULTAN
  </div>

  <!-- SETTING BUTTON -->
  <button class="setting-btn" onclick="toggleSetting()">
    <i class="fas fa-cog"></i>
  </button>

  <!-- MUSIC CONTROL -->
  <button class="music-control" id="musicBtn" onclick="toggleMusic()">
    <i class="fas fa-music"></i>
  </button>

  <!-- AUDIO - GANTI LINK LAGU KALO MAU -->
  <audio id="bgMusic" loop>
    <source src="https://drive.google.com/file/d/1838SqIB1dEB7Mar7YkUVuJ5qbkNfRz_g/view?usp=drivesdk" type="audio/mpeg">
  </audio>

  <!-- SETTING PANEL -->
  <div class="setting-panel" id="settingPanel">
    <h3><i class="fas fa-user-shield"></i> DEVELOPER PANEL</h3>
    
    <div class="setting-group">
      <label>Judul Website</label>
      <input type="text" id="siteTitle" value="FADIL SULTAN VIRAL">
    </div>

    <div class="setting-group">
      <label>Nama Developer</label>
      <input type="text" id="devName" value="FADIL SULTAN">
    </div>

    <div class="setting-group">
      <label>Warna Primary</label>
      <input type="color" id="colorPrimary" value="#ff0033">
    </div>

    <div class="setting-group">
      <label>Warna Accent</label>
      <input type="color" id="colorAccent" value="#00ff88">
    </div>

    <div class="setting-group">
      <label>Link TikTok</label>
      <input type="text" id="tiktokLink" value="https://tiktok.com/@fadilsultan">
    </div>

    <div class="setting-group">
      <label>Anime Dance</label>
      <select id="animeSelect">
        <option value="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExdDZ0ZzZ6YzZ4aGg3cTN1cnQ5b2J2bXg5b3Z1dGJ1Z3E3d3R6dSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/3o7TKz2eMXx7dn95FS/giphy.gif">Cewek 1</option>
        <option value="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExaXN4YnQ5cXJ5dHZ5c2JqZzZ5cTN1cnQ5b2J2bXg5b3Z1dGJ1Z3E3d3R6dSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/l0HlvtIPzPdt2usKs/giphy.gif">Cewek 2</option>
        <option value="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbWN0ZzZ6YzZ4aGg3cTN1cnQ5b2J2bXg5b3Z1dGJ1Z3E3d3R6dSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/3oKIPsx2VAYAgEHC12/giphy.gif">Cewek 3</option>
      </select>
    </div>

    <button class="btn-dev" onclick="saveSettings()">
      <i class="fas fa-save"></i> SIMPAN & TERAPKAN
    </button>
    <button class="btn-dev" onclick="resetViral()">
      <i class="fas fa-sync"></i> RESET COUNTER VIRAL
    </button>
  </div>

  <!-- HERO -->
  <section class="hero">
    <!-- ANIME DANCE -->
    <div class="anime-container">
      <div class="anime-girl" id="animeGirl"></div>
    </div>

    <h1 id="mainTitle">FADIL SULTAN VIRAL</h1>
    <p id="mainDesc">Web Official Paling Viral Se-Indonesia 2026</p>
    <div class="dev-credit">
      <i class="fas fa-crown"></i> Developed by <span id="devNameText">FADIL SULTAN</span> | 
      <i class="fas fa-shield-alt"></i> Verified Developer
    </div>

    <!-- VIRAL STATS -->
    <div class="viral-stats">
      <div class="stat">
        <div class="stat-number" id="viewCount">0</div>
        <div class="stat-label">Views</div>
      </div>
      <div class="stat">
        <div class="stat-number" id="shareCount">0</div>
        <div class="stat-label">Shares</div>
      </div>
      <div class="stat">
        <div class="stat-number" id="onlineCount">1</div>
        <div class="stat-label">Online</div>
      </div>
    </div>

    <!-- VIRAL BUTTONS -->
    <div class="viral-btns">
      <button class="btn btn-share" onclick="shareWA()">
        <i class="fab fa-whatsapp"></i> Share WA
      </button>
      <button class="btn btn-tiktok" onclick="openTikTok()">
        <i class="fab fa-tiktok"></i> TikTok
      </button>
      <button class="btn btn-copy" onclick="copyLink()">
        <i class="fas fa-link"></i> Copy Link
      </button>
    </div>
  </section>

  <div class="toast" id="toast"></div>

  <script>
    // === DEVELOPER CONFIG ===
    let config = JSON.parse(localStorage.getItem('fadilDevConfigV3')) || {
      siteTitle: 'FADIL SULTAN VIRAL',
      devName: 'FADIL SULTAN',
      colorPrimary: '#ff0033',
      colorAccent: '#00ff88',
      tiktokLink: 'https://tiktok.com/@fadilsultan',
      animeUrl: 'https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExdDZ0ZzZ6YzZ4aGg3cTN1cnQ5b2J2bXg5b3Z1dGJ1Z3E3d3R6dSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/3o7TKz2eMXx7dn95FS/giphy.gif'
    };

    let stats = JSON.parse(localStorage.getItem('fadilViralStats')) || {
      views: 0,
      shares: 0
    };

    const bgMusic = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');

    // === INIT ===
    function init() {
      applyConfig();
      updateStats();
      stats.views++;
      saveStats();
      updateStats();
      fakeOnline();
      autoPlayMusic();
    }

    function applyConfig() {
      document.getElementById('mainTitle').textContent = config.siteTitle;
      document.getElementById('devNameText').textContent = config.devName;
      document.getElementById('siteTitle').value = config.siteTitle;
      document.getElementById('devName').value = config.devName;
      document.getElementById('colorPrimary').value = config.colorPrimary;
      document.getElementById('colorAccent').value = config.colorAccent;
      document.getElementById('tiktokLink').value = config.tiktokLink;
      document.getElementById('animeSelect').value = config.animeUrl;
      document.getElementById('animeGirl').style.backgroundImage = `url('${config.animeUrl}')`;
      document.documentElement.style.setProperty('--primary', config.colorPrimary);
      document.documentElement.style.setProperty('--accent', config.colorAccent);
    }

    function updateStats() {
      document.getElementById('viewCount').textContent = stats.views.toLocaleString();
      document.getElementById('shareCount').textContent = stats.shares.toLocaleString();
    }

    function saveStats() {
      localStorage.setItem('fadilViralStats', JSON.stringify(stats));
    }

    // === MUSIC ===
    function autoPlayMusic() {
      // Auto play setelah user interaksi pertama
      document.body.addEventListener('click', () => {
        if (bgMusic.paused) {
          bgMusic.play().then(() => {
            musicBtn.classList.add('playing');
            showToast('Musik Sultan ON! 🎵');
          }).catch(e => console.log('Autoplay diblokir browser'));
        }
      }, { once: true });
    }

    function toggleMusic() {
      if (bgMusic.paused) {
        bgMusic.play();
        musicBtn.classList.add('playing');
        showToast('Musik ON');
      } else {
        bgMusic.pause();
        musicBtn.classList.remove('playing');
        showToast('Musik OFF');
      }
    }

    // === SETTING PANEL ===
    function toggleSetting() {
      document.getElementById('settingPanel').classList.toggle('active');
    }

    function saveSettings() {
      config.siteTitle = document.getElementById('siteTitle').value;
      config.devName = document.getElementById('devName').value;
      config.colorPrimary = document.getElementById('colorPrimary').value;
      config.colorAccent = document.getElementById('colorAccent').value;
      config.tiktokLink = document.getElementById('tiktokLink').value;
      config.animeUrl = document.getElementById('animeSelect').value;
      
      localStorage.setItem('fadilDevConfigV3', JSON.stringify(config));
      applyConfig();
      showToast('Setting Developer Disimpan!');
      toggleSetting();
    }

    function resetViral() {
      stats = { views: 0, shares: 0 };
      saveStats();
      updateStats();
      showToast('Counter Viral Direset!');
    }

    // === VIRAL FEATURES ===
    function shareWA() {
      stats.shares++;
      saveStats();
      updateStats();
      const text = `🔥 VIRAL PARAH! ${config.siteTitle} 🔥\n\nWeb Official by ${config.devName}\nAda anime joget + musik!\n\n${window.location.href}`;
      window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
      showToast('Thanks udah share!');
    }

    function openTikTok() {
      window.open(config.tiktokLink, '_blank');
      showToast('Follow TikTok Developer!');
    }

    function copyLink() {
      navigator.clipboard.writeText(window.location.href);
      showToast('Link dicopy! Sebarin cuy!');
    }

    function fakeOnline() {
      setInterval(() => {
        const online = Math.floor(Math.random() * 50) + 20;
        document.getElementById('onlineCount').textContent = online;
      }, 3000);
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // START
    init();
  </script>
</body>
  </html>
